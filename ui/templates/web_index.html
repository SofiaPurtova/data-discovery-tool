<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Discovery Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: #667eea;
        }

        .search-button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-button:hover {
            background: #764ba2;
        }

        .results {
            margin-top: 20px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: transform 0.2s;
        }

        .result-card:hover {
            transform: translateX(10px);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .result-icon {
            font-size: 1.5em;
        }

        .result-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .result-source {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .result-meta {
            display: flex;
            gap: 20px;
            color: #888;
            font-size: 0.9em;
        }

        .schema-link {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }

        .schema-link:hover {
            text-decoration: underline;
        }

        .sources-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .sources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .source-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }

        .source-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .source-type {
            display: inline-block;
            padding: 3px 10px;
            background: #667eea;
            color: white;
            border-radius: 15px;
            font-size: 0.8em;
            margin-bottom: 10px;
        }

        .source-stats {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .index-button {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
        }

        .index-button:hover {
            background: #218838;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        .column-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .column-table th,
        .column-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .column-table th {
            background: #f8f9fa;
            font-weight: bold;
        }

        .samples {
            color: #666;
            font-size: 0.9em;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .error {
            color: #dc3545;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Data Discovery Tool</h1>
            <p>Поиск данных в SQLite и CSV файлах</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Введите поисковый запрос (например: user, email, product...)" autofocus>
                <button class="search-button" onclick="search()">Поиск</button>
            </div>
            <div id="results" class="results"></div>
        </div>

        <div class="sources-section">
            <h2>Источники данных</h2>
            <div id="sources" class="sources-grid"></div>
        </div>
    </div>

    <!-- Модальное окно для схемы таблицы -->
    <div id="schemaModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="schemaContent"></div>
        </div>
    </div>

    <script>
        // Загрузка источников при старте
        loadSources();

        // Поиск при нажатии Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) {
                alert('Введите минимум 2 символа');
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Поиск...</div>';

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const results = await response.json();

                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="error">Ничего не найдено</div>';
                    return;
                }

                let html = '<h3>Результаты поиска:</h3>';
                results.forEach(r => {
                    const icon = r.match_type === 'table' ? '📋' : '🔍';
                    const name = r.column_name ? `${r.table_name}.${r.column_name}` : r.table_name;
                    
                    html += `
                        <div class="result-card">
                            <div class="result-header">
                                <span class="result-icon">${icon}</span>
                                <span class="result-title">${name}</span>
                            </div>
                            <div class="result-source">Источник: ${r.source_id}</div>
                            <div class="result-meta">
                                <span>Строк: ${r.row_count}</span>
                                <a class="schema-link" onclick="showSchema('${r.source_id}', '${r.path}')">Схема</a>
                            </div>
                        </div>
                    `;
                });

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = '<div class="error"> Ошибка при поиске</div>';
            }
        }

        async function loadSources() {
            try {
                const response = await fetch('/sources');
                const sources = await response.json();

                const sourcesDiv = document.getElementById('sources');
                
                if (sources.length === 0) {
                    sourcesDiv.innerHTML = '<p>Нет добавленных источников</p>';
                    return;
                }

                let html = '';
                sources.forEach(s => {
                    const status = s.status === 'indexed' ? '✅' : '⏳';
                    html += `
                        <div class="source-card">
                            <h3>${status} ${s.id}</h3>
                            <span class="source-type">${s.type}</span>
                            <div class="source-stats">
                                <div>Путь: ${s.connection_string}</div>
                                <div>Таблиц: ${s.tables_count}</div>
                                ${s.last_indexed ? `<div>Индексирован: ${new Date(s.last_indexed).toLocaleString()}</div>` : ''}
                            </div>
                            <button class="index-button" onclick="indexSource('${s.id}')">
                                Индексировать
                            </button>
                        </div>
                    `;
                });

                sourcesDiv.innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки источников:', error);
            }
        }

        async function indexSource(sourceId) {
            try {
                const response = await fetch(`/index/${sourceId}`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    alert(`${result.message}`);
                    loadSources();  // Обновляем список источников
                } else {
                    alert(`Ошибка: ${result.error}`);
                }
            } catch (error) {
                alert('Ошибка при индексации');
            }
        }

        async function showSchema(sourceId, path) {
            const modal = document.getElementById('schemaModal');
            const content = document.getElementById('schemaContent');
            
            content.innerHTML = '<div class="loading">Загрузка...</div>';
            modal.style.display = 'block';

            try {
                const response = await fetch(`/schema/${sourceId}/${encodeURIComponent(path)}`);
                const schema = await response.json();

                if (schema.error) {
                    content.innerHTML = `<div class="error">${schema.error}</div>`;
                    return;
                }

                let html = `
                    <h2>${schema.table_name}</h2>
                    <p>Источник: ${schema.source_id} | Строк: ${schema.row_count}</p>
                    <table class="column-table">
                        <thead>
                            <tr>
                                <th>Колонка</th>
                                <th>Тип</th>
                                <th>Примеры</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                schema.columns.forEach(col => {
                    html += `
                        <tr>
                            <td><strong>${col.name}</strong></td>
                            <td>${col.type}</td>
                            <td class="samples">${col.samples.join(', ')}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = '<div class="error"> Ошибка загрузки схемы</div>';
            }
        }

        function closeModal() {
            document.getElementById('schemaModal').style.display = 'none';
        }

        // Закрытие модального окна по клику вне его
        window.onclick = function(event) {
            const modal = document.getElementById('schemaModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
